workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.theanvil
      groups:
        - app_store
      vars:
        XCODE_WORKSPACE: ios/App/App.xcodeproj
        XCODE_SCHEME: App
      node: 22
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Add Widget Extension to Xcode project
        script: |
          gem install xcodeproj --no-document 2>/dev/null || true
          ruby scripts/add_widget.rb

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Increment build number
        script: cd ios/App && agvtool new-version -all $BUILD_NUMBER

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

      - name: Publish to TestFlight
        script: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 --decode > /tmp/private_key.p8
          app-store-connect publish \
            --path build/ios/ipa/App.ipa \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @file:/tmp/private_key.p8 \
            --testflight

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
